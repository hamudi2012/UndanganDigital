<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Digital Architect - GitHub Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --panel: #161616; }
        body { background-color: var(--dark-bg); font-family: 'Montserrat', sans-serif; color: #ffffff; margin: 0; padding: 20px 10px; }
        .brand-header { text-align: center; margin-bottom: 20px; }
        .brand-header h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold); letter-spacing: 2px; }
        .editor-box { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .label-custom { display: block; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; font-size: 0.7rem; margin-bottom: 10px; font-weight: 700; text-align: center; }
        .form-control-dark { background: #000; border: 1px solid #333; color: #fff; border-radius: 8px; padding: 12px; font-size: 0.9rem; margin-bottom: 15px; }
        textarea.form-control-dark { font-family: 'Consolas', monospace; min-height: 300px; text-align: left; border-left: 3px solid var(--gold); }
        .btn-publish { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; width: 100%; border-radius: 8px; transition: 0.3s; }
        .btn-publish:disabled { background: #555; }
        #status-log { font-size: 0.7rem; color: #888; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="brand-header">
        <h2>Studio</h2>
        <p style="letter-spacing: 3px; font-size: 0.6rem; color: #555;">GITHUB AUTO-PUBLISH</p>
    </div>

    <div class="editor-box">
        <div class="mb-3">
            <input type="password" id="gh-token" class="form-control-dark w-100" placeholder="MASUKKAN PAT TOKEN DISINI">
            <input type="text" id="gh-repo" class="form-control-dark w-100" placeholder="USERNAME/NAMA-REPO">
        </div>

        <div class="form-group">
            <label class="label-custom">Project Title (Slug)</label>
            <input type="text" id="judul" class="form-control-dark w-100" placeholder="misal: wedding-wawa" required>
        </div>
        
        <div class="form-group">
            <label class="label-custom">Source Code (HTML)</label>
            <textarea id="content" class="form-control-dark w-100" placeholder="Paste kodingan undangan lo disini..." required></textarea>
        </div>

        <button id="btnPush" class="btn-publish" onclick="publishKeGitHub()">Execute & Publish to GitHub</button>
        <div id="status-log">Ready to deploy...</div>
    </div>
</div>

<script>
    async function publishKeGitHub() {
        const token = document.getElementById('gh-token').value;
        const repo = document.getElementById('gh-repo').value;
        const title = document.getElementById('judul').value;
        const content = document.getElementById('content').value;
        const log = document.getElementById('status-log');
        const btn = document.getElementById('btnPush');

        if(!token || !repo || !title) return alert("Lengkapi Token, Repo, dan Judul!");

        btn.disabled = true;
        log.innerText = "Connecting to GitHub API...";

        const fileName = `undangan/${title}.html`;
        const path = `https://api.github.com/repos/${repo}/contents/${fileName}`;

        // 1. Cek apakah file sudah ada untuk dapetin SHA (biar bisa overwrite)
        let sha = "";
        try {
            const check = await fetch(path, { headers: { 'Authorization': `token ${token}` } });
            if(check.ok) {
                const data = await check.json();
                sha = data.sha;
            }
        } catch(e) {}

        // 2. Push File ke GitHub
        const response = await fetch(path, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${token}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: `Publish undangan: ${title}`,
                content: btoa(unescape(encodeURIComponent(content))), // Encode ke Base64
                sha: sha
            })
        });

        if(response.ok) {
            log.innerText = "SUCCESS! File live dalam 1 menit.";
            alert("Undangan Berhasil Dipublikasikan!");
        } else {
            log.innerText = "FAILED! Cek Token atau Nama Repo.";
            alert("Gagal Publish. Cek log.");
        }
        btn.disabled = false;
    }
</script>
</body>
</html>
