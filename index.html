<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Architect Ultra</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --panel: #161616; }
        body { background-color: var(--dark-bg); font-family: sans-serif; color: #fff; padding: 10px; margin: 0; }
        .nav-custom { display: flex; justify-content: center; gap: 5px; margin: 15px 0; }
        .btn-nav { background: none; border: 1px solid #333; color: #888; padding: 8px 12px; border-radius: 5px; font-size: 0.7rem; text-transform: uppercase; }
        .btn-nav.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        .editor-box { background: var(--panel); padding: 15px; border-radius: 12px; border: 1px solid #222; margin-bottom: 80px; }
        .form-control-dark { background: #000; border: 1px solid #333; color: #fff; margin-bottom: 12px; padding: 10px; width: 100%; border-radius: 6px; font-size: 0.8rem; }
        textarea { min-height: 300px; font-family: monospace; font-size: 11px; border-left: 3px solid var(--gold) !important; }
        .btn-gold { background: var(--gold); color: #000; font-weight: 800; width: 100%; padding: 12px; border: none; border-radius: 6px; text-transform: uppercase; font-size: 0.8rem; }
        
        /* FILE MANAGER STYLE */
        .file-card { background: #000; border: 1px solid #222; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .file-info { font-size: 0.7rem; margin-bottom: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-actions { display: flex; gap: 5px; }
        .btn-act { flex: 1; font-size: 0.6rem; padding: 5px; border-radius: 4px; border: none; font-weight: bold; text-transform: uppercase; }
        .btn-view { background: #28a745; color: #fff; }
        .btn-del { background: #dc3545; color: #fff; }
        .btn-cp { background: var(--gold); color: #000; }
        
        .hidden { display: none; }
        #status-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #000; padding: 5px; font-size: 0.6rem; text-align: center; border-top: 1px solid #222; color: var(--gold); }
    </style>
</head>
<body>

<div class="text-center mt-3">
    <h3 style="color:var(--gold); font-weight: 800; margin:0;">STUDIO</h3>
    <p style="font-size:0.5rem; letter-spacing: 3px; color:#555;">ULTRA MANAGER</p>
</div>

<div class="nav-custom">
    <button onclick="switchTab('build')" id="tab-build" class="btn-nav active">Builder</button>
    <button onclick="switchTab('assets')" id="tab-assets" class="btn-nav">Assets</button>
    <button onclick="switchTab('archive')" id="tab-archive" class="btn-nav">Archive</button>
</div>

<div id="sec-build" class="tab-sec">
    <div class="editor-box">
        <button onclick="configToken()" class="btn btn-sm btn-dark w-100 mb-3" style="font-size:0.6rem; border:1px solid #333">⚙️ CONFIG TOKEN</button>
        <input type="text" id="judul" class="form-control-dark" placeholder="Project Name">
        <textarea id="content" class="form-control-dark" placeholder="Paste HTML..."></textarea>
        <button class="btn-gold" onclick="doBuild()">Publish Undangan</button>
    </div>
</div>

<div id="sec-assets" class="tab-sec hidden">
    <div class="editor-box">
        <input type="file" id="fMedia" hidden onchange="doUpload()">
        <button onclick="document.getElementById('fMedia').click()" class="btn-gold mb-3">Upload Media</button>
        <div id="asset-container"></div>
    </div>
</div>

<div id="sec-archive" class="tab-sec hidden">
    <div class="editor-box">
        <div id="archive-container"></div>
    </div>
</div>

<div id="status-bar">READY</div>

<script>
    const REPO = "hamudi2012/UndanganDigital";

    function switchTab(t) {
        document.querySelectorAll('.tab-sec').forEach(s => s.classList.add('hidden'));
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('sec-' + t).classList.remove('hidden');
        document.getElementById('tab-' + t).classList.add('active');
        if(t !== 'build') refreshList(t === 'assets' ? 'uploads' : 'skrip');
    }

    function configToken() {
        const t = prompt("Masukkan Token ghp_:");
        if(t) { localStorage.setItem('_gh_tkn_u', t.trim()); alert("OK!"); }
    }

    async function pushToGH(path, content, isB64 = false) {
        const tkn = localStorage.getItem('_gh_tkn_u');
        if(!tkn) return alert("Set Token Dulu!");
        updateStatus("Processing...");
        const url = `https://api.github.com/repos/${REPO}/contents/${path}`;
        try {
            let sha = "";
            const ck = await fetch(url, { headers: {'Authorization': `token ${tkn}`} });
            if(ck.ok) { const d = await ck.json(); sha = d.sha; }
            const res = await fetch(url, {
                method: 'PUT',
                headers: {'Authorization': `token ${tkn}`},
                body: JSON.stringify({
                    message: `Action: ${path}`,
                    content: isB64 ? content : btoa(unescape(encodeURIComponent(content))),
                    sha: sha
                })
            });
            if(res.ok) { alert("SUKSES!"); switchTab(path.split('/')[0] === 'uploads' ? 'assets' : 'archive'); }
        } catch(e) { alert(e.message); }
        updateStatus("Ready");
    }

    async function doDelete(path) {
        if(!confirm("Hapus file ini permanen?")) return;
        const tkn = localStorage.getItem('_gh_tkn_u');
        updateStatus("Deleting...");
        try {
            const ck = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                headers: {'Authorization': `token ${tkn}`}
            });
            const d = await ck.json();
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                method: 'DELETE',
                headers: {'Authorization': `token ${tkn}`},
                body: JSON.stringify({ message: "Delete file", sha: d.sha })
            });
            if(res.ok) { alert("Terhapus!"); refreshList(path.split('/')[0]); }
        } catch(e) { alert("Gagal hapus!"); }
        updateStatus("Ready");
    }

    async function refreshList(folder) {
        const tkn = localStorage.getItem('_gh_tkn_u');
        const cont = document.getElementById(folder === 'uploads' ? 'asset-container' : 'archive-container');
        cont.innerHTML = "<p style='font-size:0.7rem'>Loading...</p>";
        try {
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${folder}`, {
                headers: {'Authorization': `token ${tkn}`}
            });
            const data = await res.json();
            cont.innerHTML = "";
            data.reverse().forEach(item => {
                const link = `https://hamudi2012.github.io/UndanganDigital/${item.path}`;
                cont.innerHTML += `
                    <div class="file-card">
                        <div class="file-info">${item.name}</div>
                        <div class="file-actions">
                            <button class="btn-act btn-view" onclick="window.open('${link}')">Buka</button>
                            <button class="btn-act btn-cp" onclick="copyIt('${link}')">Link</button>
                            <button class="btn-act btn-del" onclick="doDelete('${item.path}')">Hapus</button>
                        </div>
                    </div>`;
            });
        } catch(e) { cont.innerHTML = "Kosong."; }
    }

    // Fungsi Upload & Build Tetap Sama (Disesuaikan)
    async function doBuild() {
        const tit = document.getElementById('judul').value.trim();
        const code = document.getElementById('content').value;
        if(!tit || !code) return alert("Lengkapi data!");
        const slug = tit.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        await pushToGH(`skrip/${slug}.html`, code);
    }

    async function doUpload() {
        const file = document.getElementById('fMedia').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = () => pushToGH(`uploads/${Date.now()}-${file.name}`, reader.result.split(',')[1], true);
        reader.readAsDataURL(file);
    }

    function copyIt(v) { navigator.clipboard.writeText(v); alert("Copy!"); }
    function updateStatus(m) { document.getElementById('status-bar').innerText = m.toUpperCase(); }
    function configToken() { 
        const t = prompt("Masukkan Token:"); 
        if(t) { localStorage.setItem('_gh_tkn_u', t.trim()); alert("Saved!"); }
    }
</script>
</body>
</html>
