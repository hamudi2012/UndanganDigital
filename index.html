<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Studio Architect - Secure Builder</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --panel: #161616; }
        body { background-color: var(--dark-bg); font-family: sans-serif; color: #fff; padding: 15px; }
        .editor-box { background: var(--panel); padding: 20px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .form-control-dark { background: #000; border: 1px solid #333; color: #fff; margin-bottom: 12px; padding: 12px; width: 100%; border-radius: 8px; }
        textarea { min-height: 350px; font-family: monospace; font-size: 11px; border-left: 3px solid var(--gold); }
        .btn-publish { background: var(--gold); color: #000; font-weight: 800; width: 100%; padding: 15px; border: none; border-radius: 8px; text-transform: uppercase; }
        .status-msg { font-size: 0.7rem; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="editor-box">
    <h2 style="color:var(--gold)">STUDIO BUILDER</h2>
    <p style="font-size:0.7rem">REPO: hamudi2012/UndanganDigital</p>

    <button onclick="setToken()" class="btn btn-sm btn-outline-secondary mb-3" style="font-size:0.6rem">⚙️ SET/GANTI TOKEN</button>

    <input type="text" id="judul" class="form-control-dark" placeholder="Judul Project (Contoh: wedding-mega)">
    <textarea id="content" class="form-control-dark" placeholder="Paste HTML Undangan..."></textarea>
    
    <button class="btn-publish" id="btnExec" onclick="executeBuild()">Execute & Publish</button>
    <div id="status-log" class="status-msg">Siap bekerja...</div>
</div>

<script>
    const MY_REPO = "hamudi2012/UndanganDigital";

    // Fungsi buat simpan token ke memori HP lo doang
    function setToken() {
        const t = prompt("Masukkan Token ghp_ lo:");
        if(t) {
            localStorage.setItem('gh_token_privat', t.trim());
            alert("Token tersimpan aman di HP lo!");
        }
    }

    async function executeBuild() {
        const token = localStorage.getItem('gh_token_privat');
        const title = document.getElementById('judul').value.trim();
        let source = document.getElementById('content').value;
        const log = document.getElementById('status-log');

        if(!token) return alert("Klik tombol SET TOKEN dulu, Bro!");
        if(!title || !source) return alert("Judul & Kodingan harus diisi!");

        log.innerText = "Processing...";
        const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        const fileName = `skrip/${slug}.html`;
        const apiUrl = `https://api.github.com/repos/${MY_REPO}/contents/${fileName}`;

        try {
            let sha = "";
            const check = await fetch(apiUrl, { headers: { 'Authorization': `token ${token}` } });
            if(check.ok) { const d = await check.json(); sha = d.sha; }

            const res = await fetch(apiUrl, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: `Build: ${title}`,
                    content: btoa(unescape(encodeURIComponent(source))),
                    sha: sha
                })
            });

            if(res.ok) {
                alert("JOSS! Link Live:\nhttps://hamudi2012.github.io/UndanganDigital/" + fileName);
                log.innerText = "Sukses!";
            } else {
                const err = await res.json();
                alert("Gagal: " + err.message);
                if(err.message === "Bad credentials") alert("Token lo hangus! Klik SET TOKEN lagi pke yg baru.");
            }
        } catch(e) { alert("Error: " + e.message); }
    }
</script>
</body>
</html>
