<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE BIG DAY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Montserrat:wght@500;800;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF0080 0%, #7928CA 100%);
            --glass-white: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
        }

        body { 
            background: #0f0c29;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff; font-family: 'Montserrat', sans-serif;
            margin: 0; overflow: hidden; height: 100vh;
        }

        /* --- SINKRONISASI HURUF (HP & DESKTOP) --- */
        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.8rem !important; /* Pas di HP */
            font-weight: 900; line-height: 1.1;
            background: linear-gradient(to bottom, #fff 30%, #7928CA 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        h2 { font-family: 'Cinzel', serif; font-size: 1.8rem !important; color: #00dfd8; }
        
        @media (min-width: 768px) {
            h1 { font-size: 5rem !important; }
            h2 { font-size: 3.5rem !important; }
        }

        /* --- UI COMPONENTS --- */
        #overlayer { position: fixed; inset: 0; z-index: 2000; background: var(--primary-gradient); display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .box-tamu { background: var(--glass-white); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 25px; padding: 20px; margin: 20px 0; }
        
        .nav-bar { position: fixed; bottom: 10px; left: 10px; right: 10px; height: 75px; background: rgba(255, 255, 255, 0.1); display: flex; border-radius: 20px; border: 1px solid var(--glass-border); backdrop-filter: blur(20px); z-index: 1500; }
        .nav-item { flex: 1; border: none; background: none; color: rgba(255,255,255,0.5); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; }
        .nav-item.active { color: #fff; transform: translateY(-10px); }
        .nav-item i { font-size: 1.4rem; }
        .nav-item span { font-size: 0.6rem; font-weight: 800; }

        .content-area { height: 100vh; overflow-y: auto; padding: 40px 20px 150px 20px; }
        .panel { display: none; text-align: center; }
        .panel.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .luxury-card { background: var(--glass-white); backdrop-filter: blur(10px); border: 1px solid var(--glass-border); padding: 20px; margin-bottom: 20px; border-radius: 20px; }
        .btn-main { background: #fff; color: #7928CA !important; font-weight: 900; padding: 15px; border-radius: 50px; border: none; width: 100%; max-width: 280px; }
        .form-control { background: rgba(255,255,255,0.1) !important; color: white !important; border: 1px solid var(--glass-border) !important; border-radius: 12px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="overlayer">
    <div class="container">
        <p style="letter-spacing: 5px;">THE WEDDING</p>
        <h1 id="disp-mempelai">Loading...</h1>
        <div class="box-tamu">
            <p>SPECIAL GUEST:</p>
            <h2 id="disp-tamu">Tamu Undangan</h2>
        </div>
        <button class="btn-main" onclick="mulai()">ENTER EXPERIENCE</button>
    </div>
</div>

<div class="content-area" id="mainContent">
    <div id="p1" class="panel active">
        <h1>UNFORGETTABLE MOMENT</h1>
        <div class="luxury-card"><p>Kami mengundang Anda merayakan cinta kami.</p></div>
    </div>

    <div id="p6" class="panel">
        <h2>JOIN US</h2>
        <div class="luxury-card">
            <input type="text" id="inp-nama" class="form-control" placeholder="Nama Anda">
            <select id="inp-status" class="form-control">
                <option value="Hadir">YES, I'M COMING!</option>
                <option value="Tidak Hadir">SORRY, NO</option>
            </select>
            <textarea id="inp-ucapan" class="form-control" style="height: 100px;" placeholder="Write your wish..."></textarea>
            <button class="btn-main" onclick="kirimRSVP()">KIRIM UCAPAN</button>
        </div>
        <div id="display-rsvp" class="mt-4 text-start"></div>
    </div>
</div>

<div class="nav-bar">
    <button class="nav-item active" onclick="buka('p1', this)"><i class="fa-solid fa-bolt"></i><span>START</span></button>
    <button class="nav-item" onclick="buka('p6', this)"><i class="fa-solid fa-paper-plane"></i><span>RSVP</span></button>
</div>

<script>
    // 1. LOGIKA URL PARAMETERS (Gantiin PHP $_GET)
    const urlParams = new URLSearchParams(window.location.search);
    const tamu = urlParams.get('to') || 'Tamu Undangan';
    const pria = urlParams.get('p1') || 'Ahmad';
    const wanita = urlParams.get('p2') || 'Siti';
    
    // Settingan Repo Lu (Dapet dari URL atau Manual)
    const USER_REPO = "USERNAME_LU/NAMA_REPO"; 
    const TOKEN_GH = "ghp_xxxxxxxxxxxxxxx"; // Nanti isi PAT lu di builder

    document.getElementById('disp-tamu').innerText = tamu;
    document.getElementById('disp-mempelai').innerHTML = `${pria}<br>&<br>${wanita}`;
    document.getElementById('inp-nama').value = tamu;

    function mulai() { 
        document.getElementById('overlayer').style.display = 'none'; 
        muatUcapan();
    }

    function buka(id, el) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
    }

    // 2. LOGIKA MUAT UCAPAN DARI JSON REPO
    async function muatUcapan() {
        const path = `https://raw.githubusercontent.com/${USER_REPO}/main/database/ucapan.json?t=${Date.now()}`;
        try {
            const res = await fetch(path);
            const data = await res.json();
            let html = '';
            data.forEach(i => {
                html += `<div class="luxury-card"><b>${i.nama}</b><br><small>${i.ucapan}</small></div>`;
            });
            document.getElementById('display-rsvp').innerHTML = html;
        } catch (e) { document.getElementById('display-rsvp').innerHTML = "Belum ada ucapan."; }
    }

    // 3. LOGIKA KIRIM KE GITHUB ACTIONS
    async function kirimRSVP() {
        const payload = {
            nama: document.getElementById('inp-nama').value,
            ucapan: document.getElementById('inp-ucapan').value,
            status: document.getElementById('inp-status').value,
            waktu: new Date().toLocaleString('id-ID')
        };

        const res = await fetch(`https://api.github.com/repos/${USER_REPO}/dispatches`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${TOKEN_GH}`, 'Accept': 'application/vnd.github.v3+json' },
            body: JSON.stringify({ event_type: 'simpan-ucapan', client_payload: { data: payload } })
        });

        if(res.ok) alert("Terkirim! GitHub Actions sedang bekerja.");
    }
</script>
</body>
</html>
